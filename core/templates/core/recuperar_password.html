<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Recuperar contraseña — Inversiones Ramón</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f0f4ff; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { max-width:420px; width:100%; border-radius:16px; box-shadow:0 4px 32px rgba(26,86,219,.10); border:none; padding:2rem; }
    .btn-action { background: #1a56db; color: #fff; padding: .75rem; font-weight: 600; border-radius: 8px; width: 100%; border: none; }
    .btn-action:hover { background: #1344b8; color: #fff; }
  </style>
</head>
<body>
<div class="card">
  <h5 class="fw-bold mb-1">Recuperar contraseña</h5>
  <p class="text-muted small mb-3">Ingresa tu correo institucional y recibirás un enlace válido por 15 minutos.</p>
  
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-{{ msg.tags }} alert-dismissible fade show small" role="alert">
        {{ msg }}
      </div>
    {% endfor %}
  {% endif %}

  <form method="post" novalidate>
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold">{{ form.email.label }}</label>
      {{ form.email }}
      {% if form.email.errors %}
        <div class="text-danger small mt-1">{{ form.email.errors.0 }}</div>
      {% endif %}
    </div>
    
    <button type="submit" class="btn btn-action mb-2">Enviar enlace</button>
    <a href="{% url 'core:login' %}" class="btn btn-link w-100 text-decoration-none small">Volver al login</a>
  </form>
</div>
</body>
</html>
